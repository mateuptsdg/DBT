name: dbt CD (Despliegue)

on:
  push:
    branches: [qa, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      - name: Desplegar a QA
        if: github.ref == 'refs/heads/qa'
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_ID_QA }} # Job ID del entorno QA
        run: |
          python scripts/orchestrator.py \
            --job_id $DBT_JOB_ID \
            --message "Deploy QA - Commit ${{ github.sha }}" \
            --steps "dbt compile"

      - name: Desplegar a PROD
        if: github.ref == 'refs/heads/main'
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_ID_PROD }} # Job ID del entorno PROD
        run: |
          python scripts/orchestrator.py \
            --job_id $DBT_JOB_ID \
            --message "Deploy PROD - Commit ${{ github.sha }}" \
            --steps "dbt compile"
