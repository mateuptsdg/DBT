name: Orquestación Diaria (Daily Load)

on:
  schedule:
    - cron: '0 6 * * 1-6' # Lunes a Sábado 06:00 UTC
  workflow_dispatch:

jobs:
  daily_load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      - name: Ejecutar Daily Load
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_DAILY_LOAD }}
        run: |
          python scripts/orchestrator.py --job_id $DBT_JOB_ID --message "Daily Load Triggered via GitHub"
