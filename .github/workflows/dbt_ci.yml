name: dbt CI (Validación)

on:
  pull_request:
    branches: [qa, main]

jobs:
  slim_ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      - name: Ejecutar Slim CI
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_ID_CI }}
        run: |
          python scripts/orchestrator.py \
            --job_id $DBT_JOB_ID \
            --message "CI PR #${{ github.event.number }}" \
            --steps "dbt build --select state:modified+"
