name: Orquestación Semanal (Full Load)

on:
  schedule:
    - cron: '0 4 * * 0' # Domingos 04:00 UTC
  workflow_dispatch:

jobs:
  weekly_full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      - name: Ejecutar Full Refresh
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          # Puedes reusar el ID del Daily si usas --steps, o usar un Job ID específico para Weekly
          DBT_JOB_ID: ${{ secrets.DBT_JOB_WEEKLY }}
        run: |
          python scripts/orchestrator.py \
            --job_id $DBT_JOB_ID \
            --message "Weekly Full Refresh via GitHub" \
            --steps "dbt build --full-refresh"
