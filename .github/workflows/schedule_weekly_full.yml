name: Orquestación Semanal (Full Load)

on:
  schedule:
    # Domingos a las 04:00 AM UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  weekly_chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      # SOLO DISPARAMOS LA PRIMERA FICHA (SOURCES)
      - name: Ejecutar Full Refresh
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
          DBT_ACCOUNT_ID: ${{ secrets.DBT_ACCOUNT_ID }}
          DBT_JOB_ID: ${{ secrets.DBT_JOB_WEEKLY }}
        run: python scripts/orchestrator.py \ --job_id $DBT_JOB_ID\ --message "Weekly Full Triggered" \--steps "dbt build --full-refresh"
