version: 2

sources:
  - name: tpch_sample
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1

    tables:
      - name: orders
        description: "Contiene todas las órdenes, con su información de prioridad, comprador..."
        columns:
          - name: o_orderkey
            tests:
              - unique
              - not_null

          - name: o_custkey
            tests:
              - not_null
              - relationships:
                  arguments: 
                    to: source('tpch_sample', 'customer')
                    field: c_custkey

          - name: o_orderstatus
            tests:
              - not_null
              - accepted_values:
                  arguments: 
                    values: ['O', 'F', 'P']
                    quote: true

          - name: o_totalprice
            tests:
              - not_null
              - is_positive  

          - name: o_orderpriority
            tests:
              - not_null
              - accepted_values: 
                  arguments:
                    values: ['1-URGENT', '2-HIGH', '3-MEDIUM', '4-NOT SPECIFIED', '5-LOW']

          - name: o_orderdate
            tests:
              - not_null
              - is_not_future 

      - name: lineitem
        description: "Detalle atómico de cada pedido con métricas de envío y precios"
        columns:
          - name: l_orderkey
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sample', 'orders')
                    field: o_orderkey

          - name: l_partkey
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sample', 'part')
                    field: p_partkey

          - name: l_returnflag
            tests:
              - accepted_values:
                  arguments:
                    values: ['N', 'R', 'A']
                    quote: true

          - name: l_shipmode
            tests:
              - accepted_values:
                  arguments:
                    values: ['TRUCK', 'AIR', 'RAIL', 'SHIP', 'MAIL', 'FOB', 'REG AIR']
                    quote: true

          - name: l_quantity
            tests: 
              - not_null
              - is_positive:
                  config:
                    severity: warn
                    warn_if: ">1"

          - name: l_discount
            description: "Porcentaje de descuento aplicado al ítem"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 0.99
                  config:
                    severity: warn
                    warn_if: ">10" 
                    store_failures: true    

          - name: l_tax
            description: "Impuesto aplicado a la línea de detalle"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 0.99
                  config:
                    severity: warn
                    warn_if: ">10"
                    store_failures: true

      - name: customer
        description: "contiene la info del comprador, tlf, direccion y nombre"
        columns:
          - name: c_custkey
            tests:
              - unique
              - not_null

      - name: supplier
        columns:
          - name: s_suppkey
            tests:
              - unique
              - not_null

      - name: part
        columns:
          - name: p_partkey
            tests:
              - unique
              - not_null

      - name: nation
        columns:
          - name: n_nationkey
            tests:
              - unique
              - not_null

      - name: region
        columns:
          - name: r_regionkey
            tests:
              - unique
              - not_null

      - name: partsupp
        columns:
          - name: ps_partkey
            tests:
              - not_null
          - name: ps_suppkey
            tests:
              - not_null
          - name: ps_availqty
            tests:
              - not_null