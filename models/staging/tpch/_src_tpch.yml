version: 2

sources:
  - name: tpch_sample
    database: MP_RAW_DATA
    schema: TPCH
    config:
      loaded_at_field: LOADED_AT
      tags: staging
    tables:
      - name: orders
        description: '{{doc("src_table_orders")}}'
        config:
          freshness: 
            warn_after: 
              count: 20
              period: minute
            
        columns:
          - name: o_orderkey
            description: '{{doc("src_table_orders_orderkey")}}'
            tests:
              - unique
              - not_null

          - name: o_clerk
            description: '{{doc("src_table_orders_clerk")}}'

          - name: o_custkey
            description: '{{doc("src_table_orders_custkey")}}'
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sample', 'customer')
                    field: c_custkey

          - name: o_orderstatus
            description: '{{doc("src_table_orders_orderstatus")}}'
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['O', 'F', 'P']
                    quote: true

          - name: o_totalprice
            description: '{{doc("src_table_orders_totalprice")}}'
            tests:
              - not_null
              - is_positive  

          - name: o_orderpriority
            description: '{{doc("src_table_orders_orderpriority")}}'
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['1-URGENT', '2-HIGH', '3-MEDIUM', '4-NOT SPECIFIED', '5-LOW']

          - name: o_orderdate
            description: '{{doc("src_table_orders_orderdate")}}'
            tests:
              - not_null
              - is_not_future 

      - name: lineitem
        description: '{{doc("src_table_lineitem")}}'
        config:
          freshness: 
            warn_after: 
              count: 24
              period: hour
        columns:
          - name: l_orderkey
            description: '{{doc("src_table_lineitem_orderkey")}}'
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sample', 'orders')
                    field: o_orderkey

          - name: l_partkey
            description: '{{doc("src_table_lineitem_partkey")}}'
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sample', 'part')
                    field: p_partkey

          - name: l_suppkey
            description: '{{doc("src_table_lineitem_suppkey")}}'

          - name: l_linenumber
            description: '{{doc("src_table_lineitem_linenumber")}}'
          
          - name: l_extendedprice
            description: '{{doc("src_table_lineitem_extendedprice")}}'

          - name: l_returnflag
            description: '{{doc("src_table_lineitem_returnflag")}}'
            tests:
              - accepted_values:
                  arguments:
                    values: ['N', 'R', 'A']
                    quote: true

          - name: l_shipmode
            description: '{{doc("src_table_lineitem_shipmode")}}'
            tests:
              - accepted_values:
                  arguments:
                    values: ['TRUCK', 'AIR', 'RAIL', 'SHIP', 'MAIL', 'FOB', 'REG AIR']
                    quote: true

          - name: l_quantity
            description: '{{doc("src_table_lineitem_quantity")}}'
            tests: 
              - not_null
              - is_positive:
                  config:
                    severity: warn
                    warn_if: ">1"

          - name: l_discount
            description: '{{doc("src_table_lineitem_discount")}}'
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                    max_value: 0.99
                  config:
                    severity: warn
                    warn_if: ">10" 
                    store_failures: true    

          - name: l_tax
            description: '{{doc("src_table_lineitem_tax")}}'
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                    max_value: 0.99
                  config:
                    severity: warn
                    warn_if: ">10"
                    store_failures: true
          - name: l_shipdate
            description: '{{doc("src_table_lineitem_shipdate")}}'

          - name: l_commitdate
            description: '{{doc("src_table_lineitem_commitdate")}}'

          - name: l_receiptdate
            description: '{{doc("src_table_lineitem_receiptdate")}}'

      - name: customer
        description: '{{doc("src_table_customer")}}'
        config:
          freshness: 
            warn_after: 
              count: 30
              period: day
        columns:
          - name: c_custkey
            description: '{{doc("src_table_customer_custkey")}}'
            tests:
              - unique
              - not_null

          - name: c_nationkey
            description: '{{doc("src_table_customer_nationkey")}}'
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:  
                    min_value: 0
                    max_value: 24
              - relationships:
                  arguments: 
                    to: ref('stg_tpch__nation') 
                    field: nation_id

          - name: c_acctbal
            description: '{{doc("src_table_customer_acctbal")}}'
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_of_type:
                  arguments:
                    column_type: number
                  config:
                    severity: error
          
          - name: c_name
            description: '{{doc("src_table_customer_name")}}'

          - name: c_phone
            description: '{{doc("src_table_customer_phone")}}'

          - name: c_mktsegment
            description: '{{doc("src_table_customer_mktsegment")}}'

      - name: supplier
        description: '{{doc("src_table_supplier")}}'
        config:
          freshness: 
            warn_after: 
              count: 30
              period: day
        columns:
          - name: s_suppkey
            description: '{{doc("src_table_supplier_suppkey")}}'
            tests:
              - unique
              - not_null

          - name: s_nationkey
            description: '{{doc("src_table_supplier_nationkey")}}'
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments: 
                    min_value: 0
                    max_value: 24
              - relationships:
                  arguments:
                    to: ref('stg_tpch__nation') 
                    field: nation_id
          
          - name: s_acctbal
            description: '{{doc("src_table_supplier_acctbal")}}'
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_of_type:
                  arguments:
                    column_type: number 
                  config:
                    severity: error

          - name: s_name
            description: '{{doc("src_table_supplier_name")}}'

          - name: s_phone
            description: '{{doc("src_table_supplier_phone")}}'

      - name: part
        description: '{{doc("src_table_part")}}'
        config:
          freshness: 
            warn_after: 
              count: 24
              period: hour
        columns:
          - name: p_partkey
            description: '{{doc("src_table_part_partkey")}}'
            tests:
              - unique
              - not_null
          - name: p_size
            description: '{{doc("src_table_part_size")}}'
            tests:
              - is_positive
          - name: p_retailprice
            description: '{{doc("src_table_part_retailprice")}}'
            tests:
              - is_positive 

          - name: p_mfgr
            description: '{{doc("src_table_part_mfgr")}}'

          - name: p_name
            description: '{{doc("src_table_part_name")}}'

          - name: p_brand
            description: '{{doc("src_table_part_brand")}}'

          - name: p_type
            description: '{{doc("src_table_part_type")}}'

      - name: nation
        description: '{{doc("src_table_nation")}}'
        columns:
          - name: n_nationkey
            description: '{{doc("src_table_nation_key")}}'
            tests:
              - unique
              - not_null
          - name: n_regionkey
            description: '{{doc("src_table_nation_regionkey")}}'
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments: 
                    min_value: 0
                    max_value: 4
              - relationships:
                  arguments:
                    to: ref('stg_tpch__region') 
                    field: region_id
              


      - name: region
        description: '{{doc("src_table_region")}}'
        columns:
          - name: r_regionkey
            description: '{{doc("src_table_region_regionkey")}}'
            tests:
              - unique
              - not_null

      - name: partsupp
        description: '{{doc("src_table_partsupp")}}'
        columns:
          - name: ps_partkey
            description: '{{doc("src_table_partsupp_partkey")}}'
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: ref('stg_tpch__part')
                    field: part_id
          - name: ps_suppkey
            description: '{{doc("src_table_partsupp_suppkey")}}'
            tests:
              - not_null
              - relationships:
                  arguments: 
                    to: ref('stg_tpch__supplier')
                    field: supplier_id
          - name: ps_availqty
            description: '{{doc("src_table_partsupp_availqty")}}'
            tests:
              - not_null
              - is_positive
          - name: ps_supplycost
            description: '{{doc("src_table_partsupp_supplycost")}}'
            tests: 
              - is_positive