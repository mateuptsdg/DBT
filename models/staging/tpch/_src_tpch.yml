version: 2

sources:
  - name: tpch_sample
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    tables:
      - name: orders
        description: "Contiene todas las ordenes, con su informacion de prioridad, comprador..."
        columns:
          - name: o_orderkey
            tests:
              - unique
              - not_null

      - name: lineitem
        description: "Contiene cada articulo que se ha comprado, con la llave de la orden, la llave del supplier y la llave del articulo"
        columns:
          - name: l_orderkey
            tests:
              - not_null
          - name: l_linenumber
            tests:
              - not_null

      - name: customer
        description: "contiene la info del comprador, tlf, direccion y nombre"
        columns:
          - name: c_custkey
            tests:
              - unique
              - not_null

      - name: supplier
        description: "Informacion de los proveedores, su pais, direccion, nombre, tlf"
        columns:
          - name: s_suppkey
            tests:
              - unique
              - not_null

      - name: part
        description: "informacion de los distintos productos que se venden"
        columns:
          - name: p_partkey
            tests:
              - unique
              - not_null

      - name: nation
        description: "Sirve de puente entre las regiones y las demas tablas, contiene el pais, su llave y la clave de la region"
        columns:
          - name: n_nationkey
            tests:
              - unique
              - not_null

      - name: region
        description: "Contiene los contienentes y se conecta a los paises con REGIONKEY"
        columns:
          - name: r_regionkey
            tests:
              - unique
              - not_null

      - name: partsupp
        description: "tabla intermedia de combinacion de las partes que se venden con sus proveedores, que dispone de la disponibilidad o stock"
        columns:
          - name: ps_partkey
            tests:
              - not_null
          - name: ps_suppkey
            tests:
              - not_null
          - name: ps_availqty
            tests:
              - not_null