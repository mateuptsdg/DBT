sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        columns: 
          - name: id
            data_tests:
              - unique
              - not_null
      - name: orders
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
        config:
          freshness:
            warn_after:
              count: 1
              period: day
            error_after:
              count: 12
              period: day
          loaded_at_field: _etl_loaded_at

models:
  - name: stg_jaffle_shop_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              values:
                - completed
                - shipped
                - placed
                - return_pending
                - returned
      - name: customer_id
        data_tests:
            - relationships:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')