version: 2

models:
  - name: fact_Order    
    description: "Tabla de hechos que contiene una línea por cada ítem vendido."
    columns:
      - name: lineitem_id
        description: "Llave primaria técnica (Hash de order_id + line_number)."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "FK que conecta con la dimensión de clientes."
        tests:
          - not_null
          - relationships:       
              to: ref('dim_Customers')
              field: customer_id

      - name: part_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_Parts')
              field: part_id

      - name: net_item_sales_amount
        description: "Monto neto tras descuentos e impuestos."
        tests:
          - is_positive # Aplicando tu macro de limpieza

  - name: fact_Stock
    description: "Balance de inventario por cada combinación de parte y proveedor."
    columns:
      - name: stock_item_key
        description: "Llave primaria (Hash de part_id + supplier_id)."
        tests:
          - unique
          - not_null
      
      - name: part_id
        tests:
          - relationships:
              to: ref('dim_Parts')
              field: part_id

      - name: available_quantity
        description: "Cantidad de unidades actualmente en stock."
        tests:
          - is_positive 

      - name: total_stock_value
        description: "Valor monetario del stock (Qty * Cost)."
        tests:
          - is_positive