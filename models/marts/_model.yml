version: 2

models:
  - name: fct_order
    description: '{{ doc("fct_order") }}'
    latest_version: 1
    versions:
      - v: 1
        defined_in: fct_order_v1
    columns:
      - name: lineitem_id
        description: "Llave primaria técnica (Hash de order_id + line_number)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK que conecta con la dimensión de clientes."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: part_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_parts')
                field: part_id
      - name: net_item_sales_amount
        description: "Monto neto tras descuentos e impuestos."
        tests:
          - is_positive

  - name: fct_stock
    description: '{{ doc("fct_stock") }}'
    latest_version: 1 
    versions:
      - v: 1
        defined_in: fct_stock_v1
    columns:
      - name: stock_item_key
        description: "Llave primaria (Hash de part_id + supplier_id)."
        tests:
          - unique
          - not_null
      - name: part_id
        tests:
          - relationships:
              arguments: 
                to: ref('dim_parts')
                field: part_id
      - name: available_quantity
        description: "Cantidad de unidades actualmente en stock."
        tests:
          - is_positive 
      - name: total_stock_value
        description: "Valor monetario del stock (Qty * Cost)."
        tests:
          - is_positive

  - name: dim_customers
    description: "{{ doc('dim_customers') }}"
    latest_version: 2
    versions:
      - v: 1
        defined_in: dim_customers_v1
      - v: 2
        defined_in: dim_customers_v2
    columns:
      - name: customer_id
      - name: phone_number
      - name: account_balance
      - name: market_segment
      - name: nation_name
      - name: region_name

  - name: dim_date
    description: "{{ doc('dim_date') }}"
    latest_version: 1
    versions:
      - v: 1
        defined_in: dim_date_v1
    columns:
      - name: date_key
      - name: full_date
      - name: day_of_month
      - name: month_number
      - name: year_number

  - name: dim_parts
    description: "{{ doc('dim_parts') }}"
    latest_version: 1
    versions:
      - v: 1
        defined_in: dim_parts_v1
    columns:
      - name: part_id
      - name: part_name
      - name: manufacturer_num
      - name: brand_num
      - name: part_type
      - name: part_size
      - name: container_type
      - name: retail_price

  - name: dim_supplier
    description: "{{ doc('dim_supplier') }}"
    latest_version: 1
    versions:
      - v: 1
        defined_in: dim_supplier_v1
    columns:
      - name: supplier_id
      - name: supplier_name
      - name: phone_number