version: 2

models:
  - name: fact_Order    
    description: '{{doc("fact_Order")}}'
    columns:
      - name: lineitem_id
        description: "Llave primaria técnica (Hash de order_id + line_number)."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "FK que conecta con la dimensión de clientes."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_Customers')
                field: customer_id

      - name: part_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_Parts')
                field: part_id

      - name: net_item_sales_amount
        description: "Monto neto tras descuentos e impuestos."
        tests:
          - is_positive

  - name: fact_Stock
    description: '{{doc("fact_Stock")}}'
    columns:
      - name: stock_item_key
        description: "Llave primaria (Hash de part_id + supplier_id)."
        tests:
          - unique
          - not_null
      
      - name: part_id
        tests:
          - relationships:
              arguments: 
                to: ref('dim_Parts')
                field: part_id

      - name: available_quantity
        description: "Cantidad de unidades actualmente en stock."
        tests:
          - is_positive 

      - name: total_stock_value
        description: "Valor monetario del stock (Qty * Cost)."
        tests:
          - is_positive

  - name: dim_Customers
    description: "{{ doc('dim_Customers') }}"
    columns:
      - name: customer_id
      - name: phone_number
      - name: account_balance
      - name: market_segment
      - name: nation_name
      - name: region_name

  - name: dim_Date
    description: "{{ doc('dim_Date') }}"
    columns:
      - name: date_key
      - name: full_date
      - name: day_of_month
      - name: month_number
      - name: year_number

  - name: dim_Parts
    description: "{{ doc('dim_Parts') }}"
    columns:
      - name: part_id
      - name: part_name
      - name: manufacturer_num
      - name: brand_num
      - name: part_type
      - name: part_size
      - name: container_type
      - name: retail_price

  - name: dim_Supplier
    description: "{{ doc('dim_Supplier') }}"
    columns:
      - name: supplier_id
      - name: supplier_name
      - name: phone_number
      - name: account_balance
      - name: supplier_nation
      - name: supplier_region