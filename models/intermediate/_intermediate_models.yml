version: 2

models:
  - name: int_customers_cleansed
    description: "{{ doc('int_customers_cleansed') }}"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: phone_number
      - name: account_balance
      - name: market_segment
      - name: nation_id

  - name: int_lineitem_cleansed
    description: "{{ doc('int_lineitem_cleansed') }}"
    columns:
      - name: lineitem_id
        tests:
          - unique
          - not_null
      - name: order_id
      - name: part_id
      - name: supplier_id
      - name: return_flag
      - name: net_item_sales_amount
      - name: quantity
      - name: ship_date_key

  - name: int_orders_cleansed
    description: "{{ doc('int_orders_cleansed') }}"
    columns:
      - name: customer_id
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
      - name: clerk_id
      - name: order_date_key

  - name: int_parts_cleansed
    description: "{{ doc('int_parts_cleansed') }}"
    columns:
      - name: part_id
        tests:
          - unique
          - not_null
      - name: part_name
      - name: manufacturer_num
      - name: brand_num
      - name: part_type
      - name: part_size
      - name: container_type
      - name: retail_price

  - name: int_partsupp_cleansed
    description: "{{ doc('int_partsupp_cleansed') }}"
    columns:
      # AHORA SÍ: Testeamos la PK real gracias a tu cambio en el SQL
      - name: partsupp_id
        tests:
          - unique
          - not_null
      - name: part_id
        tests:
          - not_null
      - name: supplier_id
        tests:
          - not_null
      - name: available_quantity
      - name: unit_cost
      - name: total_stock_value

  - name: int_supplier_cleansed
    description: "{{ doc('int_supplier_cleansed') }}"
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null
      - name: supplier_name
      - name: phone_number
      - name: account_balance
      - name: nation_id

  - name: int_nation_region
    description: "{{ doc('int_nation_region') }}"
    columns:
      - name: nation_id
        tests:
          - unique
          - not_null
      - name: nation_name
      - name: region_name