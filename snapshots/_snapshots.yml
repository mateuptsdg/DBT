version: 2

models:
  - name: snp_customer
    description: "{{ doc('snp_customers') }}"
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: "{{ doc('scd_valid_from') }}"
      - name: dbt_valid_to
        description: "{{ doc('scd_valid_to') }}"

  - name: snp_part
    description: "{{ doc('snp_parts') }}"
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: "{{ doc('scd_valid_from') }}"

  - name: snp_supplier
    description: "{{ doc('snp_suppliers') }}"
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: "{{ doc('scd_valid_from') }}"

  - name: snp_partsupp
    description: "{{ doc('snp_partsupp') }}"
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: dbt_valid_from
        description: "{{ doc('scd_valid_from') }}"